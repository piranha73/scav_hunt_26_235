<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Pocket Pal Panic</title>
    <meta
      name="description"
      content="A tiny installable scavenger hunt PWA where your teammate can be fed and tossed around."
    />
    <meta name="theme-color" content="#f36f38" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pocket Pal" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="pet-card">
        <div class="arena-wrap">
          <div class="arena" id="arena" aria-label="Play area for your teammate">
            <div class="capture-prompt" id="capturePrompt">
              <p class="capture-title">Capture your teammate</p>
              <p class="capture-copy">Take a quick photo, then trap them in the arena.</p>
              <button type="button" class="capture-cta" id="captureHeroButton">Take Photo</button>
            </div>
            <div class="pal" id="pal" aria-live="polite">
              <img class="pal-photo" id="palPhoto" alt="Captured teammate" hidden />
              <div class="pal-avatar" id="palAvatar">
                <div class="pal-face">
                  <span class="eye"></span>
                  <span class="eye"></span>
                  <span class="mouth" id="mouth"></span>
                </div>
                <div class="pal-body"></div>
              </div>
            </div>
            <div class="snack" id="snack" hidden>🍕</div>
            <div class="burst" id="burst" hidden>+1 snack</div>
          </div>
        </div>

        <div class="dashboard">
          <div class="stat">
            <span class="stat-label">Mood</span>
            <div class="meter"><div class="meter-fill" id="moodFill"></div></div>
          </div>
          <div class="stat">
            <span class="stat-label">Fullness</span>
            <div class="meter"><div class="meter-fill alt" id="fullnessFill"></div></div>
          </div>
          <div class="status-line" id="statusLine">Your pal is suspicious but cooperative.</div>
        </div>

        <div class="controls">
          <input type="file" id="photoInput" accept="image/*" capture="environment" hidden />
          <button type="button" class="action" id="captureButton">Capture Friend</button>
          <button type="button" class="action alt" id="feedButton" disabled>Feed Snack</button>
          <button type="button" class="action alt ghost-teal" id="calmButton" disabled>Pat Head</button>
          <button type="button" class="action ghost" id="installButton" hidden>Install App</button>
        </div>

        <p class="hint" id="hint">
          Start by taking a photo. After that, drag or flick your teammate to toss them around.
        </p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
